<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrador - RAT EPEC</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); max-width: 600px; margin: 20px auto; padding: 20px; }
        .container { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .admin-section { background: #eef2ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #c7d2fe; }
        .flex-group { display: flex; gap: 8px; margin-top: 8px; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .disabled { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button.secondary { background: #64748b; margin-top: 10px; }
        .btn-delete-small { background: #ef4444; padding: 5px 10px; font-size: 0.8rem; }
        #imagePreview { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .preview-wrapper { position: relative; display: inline-block; }
        .preview-wrapper img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd; }
        .btn-remove { position: absolute; top: -5px; right: -5px; background: #dc2626; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .entry-card { background: #fff; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-top: 15px; position: relative; }
        .geo-info { font-size: 0.7rem; color: var(--primary); margin-top: 5px; display: block; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--primary)">📝 Registrador - RAT EPEC</h2>

    <div class="admin-section">
        <label><strong>1. Carpeta de Trabajo</strong></label>
        <div class="flex-group">
            <input type="text" id="newRegName" placeholder="Nombre de nueva carpeta...">
            <button onclick="createNewRegister()">Crear</button>
        </div>
        <div class="flex-group" style="margin-top:15px;">
            <select id="regSelector" onchange="handleRegChange()">
                <option value="">-- Seleccionar carpeta --</option>
            </select>
            <button class="btn-delete-small" onclick="deleteCurrentRegister()">Eliminar Carpeta</button>
        </div>
    </div>

    <div id="mainEditor" class="disabled">
        <textarea id="textInput" placeholder="Detalles técnicos..."></textarea>
        <div style="background: #f1f5f9; padding: 15px; border-radius: 8px;">
            <input type="file" id="imageInput" accept="image/*" multiple onchange="handleImageSelection()">
        </div>
        <div id="imagePreview"></div>
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <button id="btnSave" onclick="saveEntry()">💾 Guardar Entrada</button>
            <div style="display: flex; gap: 10px;">
                <button class="secondary" style="flex:1" onclick="exportCurrentRegister()">📤 Exportar JSON</button>
                <button class="secondary" style="flex:1" onclick="showStats()">📊 Info Global</button>
            </div>
        </div>
        <div id="stats" style="margin-top:10px; font-size:0.8rem; display:none; background:#f1f5f9; padding:10px; border-radius:6px;"></div>
    </div>
    <div id="entriesList"></div>
</div>

<script>
    // CAMBIO DE NOMBRE DE DB PARA ASEGURAR COMPATIBILIDAD CON GEO
    const DB_NAME = 'RegistroApp_V_GEO';
    const DB_VERSION = 1; 
    let db, currentImages = [];

    async function initDB() {
        return new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onupgradeneeded = (e) => {
                const dbRes = e.target.result;
                dbRes.createObjectStore('carpetas', { keyPath: 'id', autoIncrement: true });
                const entryStore = dbRes.createObjectStore('entradas', { keyPath: 'id', autoIncrement: true });
                entryStore.createIndex('regId', 'regId', { unique: false });
            };
            request.onsuccess = (e) => { db = e.target.result; resolve(); };
        });
    }

    async function createNewRegister() {
        const input = document.getElementById('newRegName');
        if (!input.value.trim()) return;
        const tx = db.transaction(['carpetas'], 'readwrite');
        tx.objectStore('carpetas').add({ nombre: input.value.trim(), fecha: new Date().toISOString() });
        tx.oncomplete = () => { input.value = ''; loadRegisters(); };
    }

    async function loadRegisters() {
        const tx = db.transaction(['carpetas'], 'readonly');
        const req = tx.objectStore('carpetas').getAll();
        req.onsuccess = () => {
            const selector = document.getElementById('regSelector');
            const actual = selector.value;
            selector.innerHTML = '<option value="">-- Seleccionar carpeta --</option>';
            req.result.forEach(c => selector.innerHTML += `<option value="${c.id}">${c.nombre}</option>`);
            selector.value = actual;
            handleRegChange();
        };
    }

    function handleRegChange() {
        const regId = document.getElementById('regSelector').value;
        document.getElementById('mainEditor').className = regId ? '' : 'disabled';
        if (regId) loadEntries(parseInt(regId));
        else document.getElementById('entriesList').innerHTML = '';
    }

    async function deleteCurrentRegister() {
        const id = parseInt(document.getElementById('regSelector').value);
        if (!id || !confirm("¿Borrar carpeta y TODOS sus registros asociados?")) return;
        const tx = db.transaction(['carpetas', 'entradas'], 'readwrite');
        tx.objectStore('carpetas').delete(id);
        const index = tx.objectStore('entradas').index('regId');
        const keysReq = index.getAllKeys(id);
        keysReq.onsuccess = () => {
            const store = tx.objectStore('entradas');
            keysReq.result.forEach(k => store.delete(k));
        };
        tx.oncomplete = () => {
            document.getElementById('regSelector').value = "";
            loadRegisters();
        };
    }

    async function handleImageSelection() {
        const input = document.getElementById('imageInput');
        const files = Array.from(input.files);
        if (currentImages.length + files.length > 3) return alert("Máximo 3 fotos.");
        for (let f of files) {
            const base64 = await compressImage(f);
            currentImages.push({ id: Date.now() + Math.random(), data: base64 });
        }
        input.value = ""; 
        renderPreviews();
    }

    async function compressImage(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = e => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 800;
                    let w = img.width, h = img.height;
                    if (w > MAX) { h = (h * MAX) / w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                };
            };
        });
    }

    function renderPreviews() {
        document.getElementById('imagePreview').innerHTML = currentImages.map(i => `
            <div class="preview-wrapper">
                <img src="data:image/jpeg;base64,${i.data}">
                <button class="btn-remove" onclick="removePreview(${i.id})">×</button>
            </div>`).join('');
    }

    function removePreview(id) {
        currentImages = currentImages.filter(i => i.id !== id);
        renderPreviews();
    }

    // --- NUEVA FUNCIÓN PARA OBTENER UBICACIÓN ---
    async function getUbicacion() {
        // Intentar hasta 3 veces si falla
        for (let i = 0; i < 3; i++) {
            const pos = await new Promise((resolve) => {
                if (!navigator.geolocation) return resolve(null);

                navigator.geolocation.getCurrentPosition(
                    (p) => resolve({
                        lat: p.coords.latitude,
                        lng: p.coords.longitude,
                        acc: p.coords.accuracy
                    }),
                    (err) => {
                        console.warn(`Intento ${i + 1} fallido:`, err.message);
                        resolve(null);
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 15000, // Aumentamos a 15 segundos
                        maximumAge: 0
                    }
                );
            });

            if (pos) return pos; // Si obtuvo algo, sale del bucle y lo devuelve
            
            // Si falló, espera 1 segundo antes de reintentar
            await new Promise(r => setTimeout(r, 1000));
        }
        return null; // Si tras 3 intentos no hay nada, devuelve null
    }

    async function saveEntry() {
        const regId = parseInt(document.getElementById('regSelector').value);
        const textInput = document.getElementById('textInput');
        const text = textInput.value.trim();
        const btn = document.getElementById('btnSave');
        
        if (!text && currentImages.length === 0) return;

        btn.innerText = "⏳ Obteniendo ubicación...";
        btn.disabled = true;

        const ubicacion = await getUbicacion();

        const tx = db.transaction(['entradas'], 'readwrite');
        tx.objectStore('entradas').add({
            regId: regId,
            timestamp: new Date().toISOString(),
            text: text,
            images: currentImages.map(i => i.data),
            coords: ubicacion // Guardado en el registro
        });

        tx.oncomplete = () => {
            textInput.value = '';
            currentImages = [];
            btn.innerText = "💾 Guardar Entrada";
            btn.disabled = false;
            renderPreviews();
            loadEntries(regId);
        };
    }

    // --- CARGA DE ENTRADAS CON LINK DE MAPA CORREGIDO ---
    async function loadEntries(regId) {
        const tx = db.transaction(['entradas'], 'readonly');
        const index = tx.objectStore('entradas').index('regId');
        const req = index.getAll(regId);
        
        req.onsuccess = () => {
            const list = document.getElementById('entriesList');
            const entries = req.result.sort((a,b) => b.id - a.id);
            list.innerHTML = `<h3>Registros (${entries.length})</h3>` + entries.map(e => {
                // Link corregido: quitamos el /0 y usamos backticks correctamente
                const mapLink = e.coords ? `https://www.google.com/maps?q=${e.coords.lat},${e.coords.lng}` : '#';
                
                
                return `
                <div class="entry-card">
                    <button onclick="deleteEntry(${e.id}, ${regId})" style="position:absolute; top:10px; right:10px; background:none; border:none; color:red; cursor:pointer; font-weight:bold;">✖ Borrar</button>
                    <small style="color:#64748b">${new Date(e.timestamp).toLocaleString()}</small>
                    
                    ${e.coords ? `
                        <a class="geo-info" href="${mapLink}" target="_blank">
                            📍 Lat: ${e.coords.lat.toFixed(5)}, Lng: ${e.coords.lng.toFixed(5)} (±${Math.round(e.coords.acc)}m)
                        </a>
                    ` : '<small style="display:block; color:#94a3b8; font-size:0.7rem;">📍 Sin datos GPS (¿Permiso denegado o sin señal?)</small>'}

                    <p style="margin:10px 0; white-space: pre-wrap;">${e.text}</p>
                    <div style="display:flex; gap:5px; flex-wrap:wrap;">
                        ${e.images.map(img => `<img src="data:image/jpeg;base64,${img}" style="width:60px; height:60px; object-fit:cover; border-radius:4px;">`).join('')}
                    </div>
                </div>`;
            }).join('');
        };
    }

    async function deleteEntry(id, regId) {
        if (!confirm("¿Borrar este registro?")) return;
        const tx = db.transaction(['entradas'], 'readwrite');
        tx.objectStore('entradas').delete(id);
        tx.oncomplete = () => loadEntries(regId);
    }

    async function exportCurrentRegister() {
        const sel = document.getElementById('regSelector');
        const id = parseInt(sel.value);
        const nombre = sel.options[sel.selectedIndex].text;
        const tx = db.transaction(['entradas'], 'readonly');
        const req = tx.objectStore('entradas').index('regId').getAll(id);
        req.onsuccess = () => {
            const blob = new Blob([JSON.stringify({ carpeta: nombre, datos: req.result }, null, 2)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `RAT_${nombre.replace(/\s+/g,'_')}.json`;
            a.click();
        };
    }

    async function showStats() {
        const req = db.transaction(['entradas'], 'readonly').objectStore('entradas').getAll();
        req.onsuccess = () => {
            const div = document.getElementById('stats');
            div.style.display = 'block';
            div.innerHTML = `📦 Total global: ${req.result.length} registros en la App.`;
        };
    }

    window.onload = async () => { await initDB(); loadRegisters(); };
</script>
</body>
</html>
